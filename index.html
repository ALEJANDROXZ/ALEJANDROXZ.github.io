<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section>
        <form id="loginForm">
            <h1>Iniciar Sesión</h1>
            <div class="inputbox">
                <input id="email" type="email" required placeholder="Correo electrónico">
            </div>
            <div class="inputbox">
                <input id="password" type="password" required placeholder="Contraseña">
            </div>
            <button type="submit">Iniciar Sesión</button>
            <div class="register">
                <p>No tengo una cuenta. <a href="Templates/register.html">Regístrate</a></p>
            </div>
            <div class="forgot-password">
                <a href="#">Olvidé mi contraseña</a>
            </div>
        </form>
    </section>

    <script type="module" src="/Controller/index.js"></script>
</body>
</html>
